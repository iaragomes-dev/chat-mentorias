<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mentorias Sem Fronteiras</title>
<style>

body{
  margin:0;
  font-family: 'Inter', Arial, sans-serif;
  background:#f4f6f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.chat-wrapper{
  width:380px;
  height:600px;
  background:white;
  border-radius:16px;
  box-shadow:0 15px 40px rgba(0,0,0,0.15);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.chat-header{
  background:#4b2aad;
  color:white;
  padding:16px;
  font-weight:600;
  font-size:16px;
}

.chat-header small{
  display:block;
  font-weight:400;
  opacity:0.8;
  font-size:12px;
}

.chat-messages{
  flex:1;
  padding:15px;
  overflow-y:auto;
  background:#f9fafc;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.bot{
  background:white;
  padding:10px 14px;
  border-radius:14px;
  max-width:75%;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
  font-size:14px;
}

.user{
  background:#4b2aad;
  color:white;
  padding:10px 14px;
  border-radius:14px;
  align-self:flex-end;
  max-width:75%;
  font-size:14px;
}

.chat-input{
  display:flex;
  padding:12px;
  background:white;
  border-top:1px solid #eee;
}

.chat-input input{
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  outline:none;
  font-size:14px;
}

.chat-input button{
  margin-left:8px;
  background:#4b2aad;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.chat-input button:hover{
  background:#3b2190;
}

</style>
</head>
<body>

<div class="chat-wrapper">
  <div class="chat-header">
    Mentorias Sem Fronteiras
    <small>Assistente Estratégica</small>
  </div>

  <div class="chat-messages" id="messages">
    <div class="bot">
      👋 Olá! Bem-vindo(a) à Mentorias Sem Fronteiras.
      <br><br>
      Posso ajudar com:
      <br>💰 Valores
      <br>📦 Nossas mentorias
      <br>📈 Desenvolvimento profissional
      <br>👤 Falar com especialista
    </div>
  </div>

  <div class="chat-input">
    <input id="msg" placeholder="Digite sua mensagem...">
    <button onclick="send()">Enviar</button>
  </div>
</div>

<script>

async function send(){
  const input = document.getElementById("msg");
  const msg = input.value.trim();
  if(!msg) return;

  addMessage(msg,"user");
  input.value="";

  const response = await fetch("https://logindev.app.n8n.cloud/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({mensagem:msg})
  });

  const data = await response.json();
  addMessage(data.resposta,"bot");
}

function addMessage(text, type){
  const div = document.createElement("div");
  div.className = type;
  div.innerHTML = text;
  document.getElementById("messages").appendChild(div);
  document.getElementById("messages").scrollTop = 9999;
}

</script>

</body>

</html>
