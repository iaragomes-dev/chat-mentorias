<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mentorias Sem Fronteiras</title>

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
}

/* 🔥 Botão Flutuante Premium */
.chat-wrapper{
  position:fixed;
  bottom:25px;
  right:25px;
  z-index:9999;
}

.chat-bubble{
  background:white;
  padding:10px 16px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  font-size:14px;
  margin-bottom:10px;
  animation:fadeIn 0.6s ease-in-out;
}

.chat-button{
  width:70px;
  height:70px;
  border-radius:50%;
  background:linear-gradient(135deg,#5b3df5,#7a5cff);
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  box-shadow:0 15px 40px rgba(91,61,245,0.4);
  transition:0.3s;
  color:white;
  font-size:28px;
}

.chat-button:hover{
  transform:scale(1.1);
  box-shadow:0 20px 60px rgba(91,61,245,0.6);
}

/* 🟢 Indicador Online */
.online-indicator{
  position:absolute;
  bottom:5px;
  right:5px;
  width:14px;
  height:14px;
  background:#2ecc71;
  border-radius:50%;
  border:2px solid white;
}

/* ✨ Animação */
@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}
</style>
</head>

<body>

<div class="chat-wrapper">

  <div class="chat-bubble">
    💬 Fale com nossa assistente estratégica  
    <br>
    <small style="color:#2ecc71;">● Online agora</small>
  </div>

  <a href="https://logindev.app.n8n.cloud/webhook/91d3f867-7c9a-40ed-981a-cb9122d56d32/chat" target="_blank">
    <div class="chat-button">
      💬
      <div class="online-indicator"></div>
    </div>
  </a>

</div>

</body>
</html>
